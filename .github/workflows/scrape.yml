name: Daily Scrape

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Dit dwingt de server om de installatie-omgeving te verversen
      - name: Upgrade pip en installeer basistools
        run: |
          python -m pip install --upgrade pip
          pip install wheel

      # We installeren lxml en de rest nu met de vlag --no-cache-dir om GitHub te dwingen het écht te downloaden
      - name: Installeer bibliotheken
        run: pip install --no-cache-dir requests beautifulsoup4 pandas supabase lxml

      - name: Run python script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrape.py
